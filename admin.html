<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация отзывов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; }</style>
</head>
<body>
    <div class="max-w-2xl mx-auto py-8 px-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Модерация отзывов</h1>

        <!-- Авторизация -->
        <div id="auth-block" class="bg-white rounded-xl shadow p-5 mb-6">
            <label class="block text-sm font-medium text-gray-600 mb-2">Секретный ключ (ADMIN_KEY)</label>
            <div class="flex gap-3">
                <input type="password" id="admin-key" placeholder="Введите ключ"
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                <button id="load-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-5 rounded-lg text-sm transition">
                    Загрузить
                </button>
            </div>
        </div>

        <!-- Статистика -->
        <div id="stats-block" class="hidden bg-white rounded-xl shadow p-5 mb-6">
            <div class="flex items-center gap-4 text-sm text-gray-600">
                <span>Всего: <strong id="stat-total">0</strong></span>
                <span>Средний балл: <strong id="stat-avg">0</strong></span>
                <span class="text-yellow-500 font-bold" id="stat-stars"></span>
            </div>
        </div>

        <!-- Список -->
        <div id="reviews-list"></div>
        <div id="empty-msg" class="hidden text-center text-gray-400 py-12">Нет отзывов</div>
    </div>

    <script>
        const API_URL = 'https://reviews-api.masovskijartem9.workers.dev';
        let adminKey = '';

        document.getElementById('load-btn').addEventListener('click', loadReviews);
        document.getElementById('admin-key').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadReviews();
        });

        async function loadReviews() {
            adminKey = document.getElementById('admin-key').value.trim();
            if (!adminKey) return;

            try {
                const res = await fetch(API_URL + '/reviews');
                const data = await res.json();
                const reviews = data.reviews || [];
                const stats = data.stats;

                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-avg').textContent = stats.avgRating;
                document.getElementById('stat-stars').textContent = '★'.repeat(Math.round(stats.avgRating)) + '☆'.repeat(5 - Math.round(stats.avgRating));
                document.getElementById('stats-block').classList.remove('hidden');

                const listEl = document.getElementById('reviews-list');
                if (reviews.length === 0) {
                    listEl.innerHTML = '';
                    document.getElementById('empty-msg').classList.remove('hidden');
                    return;
                }
                document.getElementById('empty-msg').classList.add('hidden');

                listEl.innerHTML = reviews.map(function(r) {
                    const date = new Date(r.createdAt).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);

                    // Блок ответа
                    var replyHtml = '';
                    if (r.reply) {
                        var replyDate = new Date(r.reply.createdAt).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
                        replyHtml =
                            '<div class="mt-3 ml-4 pl-4 border-l-2 border-blue-300 bg-blue-50 rounded-r-lg p-3">' +
                            '<div class="flex items-center justify-between">' +
                            '<div class="flex items-center gap-2">' +
                            '<span class="text-xs font-bold text-blue-700">Яна Алексеевна</span>' +
                            '<span class="text-xs text-gray-400">' + replyDate + '</span>' +
                            '</div>' +
                            '<button onclick="deleteReply(\'' + r.id + '\')" class="text-xs text-red-400 hover:text-red-600 transition">удалить ответ</button>' +
                            '</div>' +
                            '<p class="text-sm text-gray-700 mt-1">' + r.reply.text + '</p>' +
                            '</div>';
                    }

                    // Кнопка «Ответить» если нет ответа
                    var replyBtnHtml = '';
                    if (!r.reply) {
                        replyBtnHtml =
                            '<div id="reply-area-' + r.id + '" class="mt-3">' +
                            '<button onclick="showReplyForm(\'' + r.id + '\')" id="reply-btn-' + r.id + '" ' +
                            'class="text-xs text-blue-500 hover:text-blue-700 font-medium transition">💬 Ответить</button>' +
                            '<div id="reply-form-' + r.id + '" class="hidden mt-2">' +
                            '<textarea id="reply-text-' + r.id + '" rows="2" maxlength="500" ' +
                            'class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none" ' +
                            'placeholder="Текст ответа (макс. 500 символов)"></textarea>' +
                            '<div class="flex gap-2 mt-2">' +
                            '<button onclick="sendReply(\'' + r.id + '\')" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-1.5 px-4 rounded-lg transition">Отправить</button>' +
                            '<button onclick="hideReplyForm(\'' + r.id + '\')" class="text-xs text-gray-400 hover:text-gray-600 transition">Отмена</button>' +
                            '</div></div></div>';
                    }

                    return '<div class="bg-white rounded-xl shadow p-4 mb-3" id="review-' + r.id + '">' +
                        '<div class="flex items-start justify-between gap-3">' +
                        '<div class="flex-1">' +
                        '<div class="flex items-center gap-2 mb-1">' +
                        '<span class="font-bold text-gray-800 text-sm">' + r.name + '</span>' +
                        '<span class="text-yellow-400 text-sm">' + stars + '</span>' +
                        '</div>' +
                        '<p class="text-gray-600 text-sm">' + r.text + '</p>' +
                        '<div class="text-xs text-gray-400 mt-2">' + date + '</div>' +
                        replyHtml +
                        replyBtnHtml +
                        '</div>' +
                        '<button onclick="deleteReview(\'' + r.id + '\')" class="bg-red-100 hover:bg-red-200 text-red-600 font-medium py-1.5 px-3 rounded-lg text-xs transition flex-shrink-0">' +
                        'Удалить' +
                        '</button>' +
                        '</div></div>';
                }).join('');

            } catch (e) {
                alert('Ошибка загрузки: ' + e.message);
            }
        }

        function showReplyForm(id) {
            document.getElementById('reply-btn-' + id).classList.add('hidden');
            document.getElementById('reply-form-' + id).classList.remove('hidden');
            document.getElementById('reply-text-' + id).focus();
        }

        function hideReplyForm(id) {
            document.getElementById('reply-btn-' + id).classList.remove('hidden');
            document.getElementById('reply-form-' + id).classList.add('hidden');
        }

        async function sendReply(id) {
            var text = document.getElementById('reply-text-' + id).value.trim();
            if (!text) { alert('Введите текст ответа'); return; }

            try {
                var res = await fetch(API_URL + '/reviews/' + id + '/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
                    body: JSON.stringify({ text: text })
                });
                var data = await res.json();
                if (!res.ok) { alert('Ошибка: ' + (data.error || 'Неизвестная')); return; }
                await loadReviews();
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        async function deleteReply(id) {
            if (!confirm('Удалить ответ?')) return;
            try {
                var res = await fetch(API_URL + '/reviews/' + id + '/reply', {
                    method: 'DELETE',
                    headers: { 'X-Admin-Key': adminKey }
                });
                var data = await res.json();
                if (!res.ok) { alert('Ошибка: ' + (data.error || 'Неизвестная')); return; }
                await loadReviews();
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        async function deleteReview(id) {
            if (!confirm('Удалить этот отзыв?')) return;
            try {
                var res = await fetch(API_URL + '/reviews/' + id, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Key': adminKey }
                });
                var data = await res.json();
                if (!res.ok) { alert('Ошибка: ' + (data.error || 'Неизвестная')); return; }
                var el = document.getElementById('review-' + id);
                if (el) {
                    el.style.transition = 'opacity 0.3s, transform 0.3s';
                    el.style.opacity = '0';
                    el.style.transform = 'translateX(20px)';
                    setTimeout(function() { el.remove(); }, 300);
                }
                setTimeout(loadReviews, 500);
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }
    </script>
</body>
</html>
